syntax = "proto3";

option csharp_namespace = "Web.InternalApi";

package album;

// The greeting service definition.
service AlbumEnrichment {
  rpc SearchAlbums (AlbumSearchRequest) returns (AlbumSearchReply);
}

message AlbumSearchRequest {
  string searchValue = 1;
}

message AlbumSearchReply {
  repeated AlbumSearchItem albums = 1;
}

message AlbumSearchItem {
  string name = 1;
  string artistName = 2;
  int32 popularity = 3;
}
