syntax = "proto3";

option csharp_namespace = "Web.InternalApi";

package musicbot;

service MusicBotScrobbling {
  rpc CheckFmbotPresent (FmbotPresentRequest) returns (FmbotPresentReply);
  rpc SubmitScrobble (MusicBotScrobbleRequest) returns (MusicBotScrobbleReply);
  rpc SubmitUrlScrobble (MusicBotUrlScrobbleRequest) returns (MusicBotScrobbleReply);
}

message FmbotPresentRequest {
  int64 discordGuildId = 1;
}

message FmbotPresentReply {
  bool present = 1;
}

message MusicBotScrobbleRequest {
  string trackName = 1;
  string artistName = 2;
  int64 trackLengthMs = 3;
  repeated int64 connectedUserDiscordIds = 4;
  string albumName = 5;
  string musicBotName = 6;
  int64 discordGuildId = 7;
  bool cleanTrackName = 8;
}

message MusicBotUrlScrobbleRequest {
  string trackUrl = 1;
  repeated int64 connectedUserDiscordIds = 2;
  string musicBotName = 3;
  int64 discordGuildId = 4;
}

message MusicBotScrobbleReply {
  bool scrobbled = 1;
  string denyReason = 2;
  repeated int64 scrobbledUserDiscordIds = 3;
}
