<html>

<head>
    <style>
        body {
            font-family: "Comic Sans MS", cursive;
            margin-right: 36px;
            margin-left: 36px;
            margin-top: 56px;
            background-color: #ff00ff;
            color: #00ff00;
            background: linear-gradient(135deg, #ff6600, #ff00ff, #00ffff, #ffff00);
        }

        .float-left {
            float: left;
        }

        .float-right {
            float: right;
        }

        .align-center {
            text-align: center;
        }

        .whoknows {
            font-size: 16px;
        }

        .title {
            font-size: 32px;
            background: linear-gradient(45deg, #ff1493, #8a2be2);
            padding: 20px 8px 20px 8px;
            margin-top: -12px;
            box-shadow: 0px 0px 20px #ff00ff, 0px 0px 40px #00ffff;
            border-radius: 8px;
            transform: rotate(1deg);
        }

        .title .wordart {
            font-family: Arial, sans-serif;
            font-size: 1em;
            font-weight: bold;
            display: inline-flex;
            transform: scale(1, 1.5);
        }

        .title .wordart .text {
            background: linear-gradient(to right, #b306a9, #ef2667, #f42e2c, #ffa509, #fdfc00, #55ac2f, #0b13fd, #a804af);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            display: initial;
            background: linear-gradient(90deg, #00ff88, #00ccff);
            padding: 8px 8px 8px 8px;
            margin-top: -16px;
            margin-right: 8px;
            margin-left: 8px;
            box-shadow: 0px 0px 15px #00ff00;
            border-radius: 6px;
            color: #ff0000;
            font-weight: bold;
            position: relative;
            z-index: 2;
        }

        .result-container {
            margin-top: 56px;
            display: flex;
            margin-left: -6px;
            margin-right: -6px;
        }

        .crown-view {
            margin-top: 32px;
            margin-left: 0;
            margin-right: 0;
            text-align: center;
        }

        .float-child {
            width: 50%;
            float: left;
            padding: 8px;
            flex: 1;
        }

        .flex-wrap {
            display: flex;
            flex-wrap: wrap;
        }

        .stat-view {
            margin-top: -20px;
        }

        .flex-wrap>* {
            flex: 1 1 auto;
        }

        img {
            max-width: -webkit-fill-available;
            border-radius: 8px;
            box-shadow: 0px 1px 4px rgba(0, 0, 0, 0.6);
            max-height: 408px;
        }

        .branding {
            margin-bottom: -20px;
            display: inline-block;
            color: #ff6600;
            padding-left: 4px;
        }

        .result-list {
            background: linear-gradient(180deg, #4b0082, #ff1493, #ff8c00);
            border-radius: 8px;
            height: 100%;
            box-shadow: 0px 0px 20px #ff00ff;
            border: 3px solid #00ff00;
        }

        ul {
            padding: 16px 16px 4px 16px;
            margin: 0 0 0 0;
            list-style-type: none;
            font-size: 28px;
            color: #ffff00;
        }

        li {
            margin-bottom: 8px;
            overflow: hidden;
            white-space: nowrap;
        }
        .num {
            width: 32px;
            display: inline-block;
            text-align: center;
            padding-left: -4px;
            max-width: 52px !important;
        }
        .own-num {
            width: {{num-width}}px !important;
        }
        .sub {
            font-size: 20px;
            min-width: 400px;
            margin-bottom: 4px;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>
    <div class="title-container">
        <div class="whoknows subtitle top">
            {{name}}
        </div>
        <div class="whoknows title align-center">
            <span class="wordart"><span class="text" data-text="{{title}}">{{title}}</span></span>
        </div>
        <div class="whoknows subtitle float-right bottom">
            {{time}}
        </div>
    </div>
    <div class="result-container">
        <div class="float-child">
            <div class="result-list">
                <ul>
                    {{users}}
                </ul>
            </div>
            <div class="whoknows subtitle bottom align-center flex-wrap stat-view">
                <span class="float-left {{diffCount}}">{{totalDifferent}} different {{type}}</span>
                <span class="{{diffCount}}"><b>·</b></span>
                <span class="float-right">{{totalPlays}} total plays</span>
            </div>
            <div class="floatleft bottom branding">
                Powered by .fmbot
            </div>
        </div>
    </div>
</body>
</html>
