<html>

<head>
    <style>
        @font-face {
            font-family: "Comic Sans MS";
            src: url("https://fm.bot/fonts/comic-sans-ms.ttf") format("truetype");
        }

        body {
            font-family: "Comic Sans MS", cursive;
            margin-right: 36px;
            margin-left: 36px;
            margin-top: 42px;
            background-color: #ff00ff;
            color: #00ff00;
            background: linear-gradient(135deg, #ff00ff, #00ffff, #ffff00, #ff6600);
        }

        .float-left {
            float: left;
        }

        .float-right {
            float: right;
        }

        .align-center {
            text-align: center;
        }

        .whoknows {
            font-size: 24px;
        }

        .title {
            font-size: 48px;
            background: linear-gradient(45deg, #ff1493, #8a2be2);
            padding: 30px 12px 30px 12px;
            margin-top: -18px;
            box-shadow: 0px 0px 20px #ff00ff, 0px 0px 40px #00ffff;
            border-radius: 12px;
            transform: rotate(-2deg);
        }

        .title .wordart {
            font-family: Arial, sans-serif;
            font-size: 1em;
            font-weight: bold;
            display: inline-flex;
            transform: scale(1, 1.5);
        }

        .title .wordart .text {
            background: linear-gradient(to right, #b306a9, #ef2667, #f42e2c, #ffa509, #fdfc00, #55ac2f, #0b13fd, #a804af);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            display: initial;
            background: linear-gradient(90deg, #00ff88, #00ccff);
            padding: 12px 12px 12px 12px;
            margin-top: -24px;
            margin-right: 12px;
            margin-left: 12px;
            box-shadow: 0px 0px 15px #00ff00;
            border-radius: 9px;
            color: #ff0000;
            font-weight: bold;
            position: relative;
            z-index: 2;
        }

        .result-container {
            margin-top: 42px;
            display: flex;
            margin-left: -9px;
            margin-right: -9px;
        }

        .crown-view {
            margin-top: 48px;
            margin-left: 0;
            margin-right: 0;
            text-align: center;
            font-size: 24px;
        }

        .float-child {
            width: 50%;
            float: left;
            padding: 12px;
            flex: 1;
        }

        .flex-wrap {
            display: flex;
            flex-wrap: wrap;
        }

        .stat-view {
            margin-top: -30px;
        }

        .flex-wrap>* {
            flex: 1 1 auto;
        }

        img {
            max-width: -webkit-fill-available;
            border-radius: 50%;
            box-shadow: 0px 0px 30px #ff00ff, 0px 0px 60px #00ffff;
            max-height: 612px;
            border: 5px dashed #ffff00;
        }

        .branding {
            margin-bottom: -60px;
            display: block;
            width: 100%;
            height: 50px;
        }

        .result-list {
            background: linear-gradient(180deg, #4b0082, #ff1493, #ff8c00);
            border-radius: 12px;
            height: 100%;
            box-shadow: 0px 0px 20px #ff00ff;
            border: 3px solid #00ff00;
        }

        ul {
            padding: 24px 24px 6px 24px;
            margin: 0 0 0 0;
            list-style-type: none;
            font-size: 30px;
            color: #ffff00;
        }

        li {
            margin-bottom: 12px;
            overflow: hidden;
            white-space: nowrap;
        }
        .num {
            width: 48px;
            display: inline-block;
            text-align: center;
            padding-left: -6px;
        }
        .num {
            width: {{num-width}}px !important;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>
    <div class="title-container">
        <div class="whoknows subtitle top">
            {{type}}
        </div>
        <div class="whoknows title align-center">
            <span class="wordart"><span class="text" data-text="{{title}}">{{title}}</span></span>
        </div>
        <div class="whoknows subtitle float-right bottom">
            {{location}}
        </div>
    </div>
    <div class="result-container">
        <div class="float-child {{hide-img}}">
            <img src="{{image-url}}">
            <svg class="branding" viewBox="0 0 500 80" xmlns="http://www.w3.org/2000/svg">
                <path id="curve" fill="transparent" d="M 30,10 Q 250,70 470,10" />
                <text font-size="24" fill="#ff6600" font-family="Comic Sans MS, cursive">
                    <textPath href="#curve" startOffset="50%" text-anchor="middle">Powered by .fmbot</textPath>
                </text>
            </svg>
        </div>
        <div class="float-child">
            <div class="result-list">
                <ul>
                    {{users}}
                </ul>
            </div>
            <div class="whoknows subtitle bottom align-center flex-wrap stat-view">
                <span class="float-left">{{listeners}} listeners</span>
                <span><b>·</b></span>
                <span class="float-right">{{plays}} plays</span>
                <span><b>·</b></span>
                <span>{{average}} avg</span>
            </div>
        </div>
    </div>

    <div class="subtitle bottom align-center flex-wrap crown-view {{crown-hide}}">
        <span>{{crown-text}}</span>
    </div>
</body>

</html>
