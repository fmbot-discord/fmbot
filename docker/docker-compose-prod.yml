name: 'fmbot-prod'

x-instance-defaults: &instance-defaults
  image: ghcr.io/fmbot-discord/fmbot:main
  restart: always
  network_mode: host
  mem_limit: 34g
  volumes:
    - /fmbot/prod/:/app/configs/
    - /fmbot/cache/:/app/cache/

services:
  prod-1:
    <<: *instance-defaults
    environment:
      - INSTANCE_NAME=prod-1
      - SHARDS_MAIN_INSTANCE=true
      - SHARDS_TOTAL_SHARDS=768
      - SHARDS_FIRST_SHARD=0
      - SHARDS_LAST_SHARD=63

  prod-2:
    <<: *instance-defaults
    depends_on:
      prod-1:
        condition: service_healthy
    environment:
      - INSTANCE_NAME=prod-2
      - SHARDS_TOTAL_SHARDS=768
      - SHARDS_FIRST_SHARD=64
      - SHARDS_LAST_SHARD=127

  prod-3:
    <<: *instance-defaults
    depends_on:
      prod-2:
        condition: service_healthy
    environment:
      - INSTANCE_NAME=prod-3
      - SHARDS_TOTAL_SHARDS=768
      - SHARDS_FIRST_SHARD=128
      - SHARDS_LAST_SHARD=191

  prod-4:
    <<: *instance-defaults
    depends_on:
      prod-3:
        condition: service_healthy
    environment:
      - INSTANCE_NAME=prod-4
      - SHARDS_TOTAL_SHARDS=768
      - SHARDS_FIRST_SHARD=192
      - SHARDS_LAST_SHARD=255

  prod-5:
    <<: *instance-defaults
    depends_on:
      prod-4:
        condition: service_healthy
    environment:
      - INSTANCE_NAME=prod-5
      - SHARDS_TOTAL_SHARDS=768
      - SHARDS_FIRST_SHARD=256
      - SHARDS_LAST_SHARD=319

  prod-6:
    <<: *instance-defaults
    depends_on:
      prod-5:
        condition: service_healthy
    environment:
      - INSTANCE_NAME=prod-6
      - SHARDS_TOTAL_SHARDS=768
      - SHARDS_FIRST_SHARD=320
      - SHARDS_LAST_SHARD=383

  prod-7:
    <<: *instance-defaults
    depends_on:
      prod-6:
        condition: service_healthy
    environment:
      - INSTANCE_NAME=prod-7
      - SHARDS_TOTAL_SHARDS=768
      - SHARDS_FIRST_SHARD=384
      - SHARDS_LAST_SHARD=447

  prod-8:
    <<: *instance-defaults
    depends_on:
      prod-7:
        condition: service_healthy
    environment:
      - INSTANCE_NAME=prod-8
      - SHARDS_TOTAL_SHARDS=768
      - SHARDS_FIRST_SHARD=448
      - SHARDS_LAST_SHARD=511

  prod-9:
    <<: *instance-defaults
    depends_on:
      prod-8:
        condition: service_healthy
    environment:
      - INSTANCE_NAME=prod-9
      - SHARDS_TOTAL_SHARDS=768
      - SHARDS_FIRST_SHARD=512
      - SHARDS_LAST_SHARD=575

  prod-10:
    <<: *instance-defaults
    depends_on:
      prod-9:
        condition: service_healthy
    environment:
      - INSTANCE_NAME=prod-10
      - SHARDS_TOTAL_SHARDS=768
      - SHARDS_FIRST_SHARD=576
      - SHARDS_LAST_SHARD=639

  prod-11:
    <<: *instance-defaults
    depends_on:
      prod-10:
        condition: service_healthy
    environment:
      - INSTANCE_NAME=prod-11
      - SHARDS_TOTAL_SHARDS=768
      - SHARDS_FIRST_SHARD=640
      - SHARDS_LAST_SHARD=703

  prod-12:
    <<: *instance-defaults
    depends_on:
      prod-11:
        condition: service_healthy
    environment:
      - INSTANCE_NAME=prod-12
      - SHARDS_TOTAL_SHARDS=768
      - SHARDS_FIRST_SHARD=704
      - SHARDS_LAST_SHARD=767

  autoheal:
    image: willfarrell/autoheal
    restart: always
    environment:
      - AUTOHEAL_CONTAINER_LABEL=all
      - AUTOHEAL_START_PERIOD=120
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
